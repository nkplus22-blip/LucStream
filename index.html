<!doctype html>
<html lang="bs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LucStreamTV – Stabilan i pouzdan TV servis</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#2ac0ff;
  --accent:#4a6bff;
  --muted:rgba(200,220,255,.25);
  --glass:rgba(255,255,255,.05);
}
{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter;
  background:linear-gradient(180deg,#050714,#02102a);
  color:#e6f7ff;
}
.wrap{max-width:1100px;margin:auto;padding:0 16px}

/ HEADER /
header{text-align:center;padding:20px 10px;position:relative}
.site-logo{max-width:180px}
.menu-toggle{
  position:absolute;top:15px;right:15px;
  background:none;border:none;
  color:var(--neon);font-size:28px;
}

/ NAV FIX /
.overlay{
  position:fixed;inset:0;
  background:#020b1f;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:999;
}
.overlay.open{
  opacity:1;
  pointer-events:auto;
}
.overlay a{
  font-size:22px;
  margin:10px 0;
}
.closebtn{
  position:absolute;top:20px;right:20px;
  font-size:32px;
}

/ HERO /
.hero{text-align:center;padding:30px 10px}
.hero h1{
  font-family:'Bebas Neue';
  font-size:48px;
  margin:0;
}
.hero p{
  font-size:15px;
  color:var(--muted);
  margin:10px 0 20px;
}

.cta{
  display:block;
  margin:10px auto;
  max-width:280px;
  padding:14px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--neon),var(--accent));
  text-align:center;
  font-weight:700;
}

/ LIVE /
.panel{
  background:var(--glass);
  border-radius:16px;
  padding:20px;
  margin:20px 0;
  text-align:center;
}
.counter{font-size:26px;color:var(--neon);font-weight:800}

/ WHATSAPP /
.whatsapp{
  position:fixed;right:15px;bottom:15px;
  padding:12px 16px;
  border-radius:12px;
  background:#25d366;
  color:#fff;
  font-weight:700;
}
</style>
</head>

<body>

<div class="wrap">

<header>
  <img src="lucstream.logo.jpg" class="site-logo">
  <button class="menu-toggle" onclick="openNav()">☰</button>
</header>

<nav id="nav" class="overlay">
  <div class="closebtn" onclick="closeNav()">×</div>
  <a href="#">Početna</a>
  <a href="#">O nama</a>
  <a href="#">Cjenovnik</a>
  <a href="#">Kontakt</a>
</nav>

<section class="hero">
  <h1>LUCSTREAM TV</h1>
  <p>Stabilan TV servis • 20.000+ korisnika</p>

  <a href="#" class="cta">🎯 Besplatna proba</a>
  <a href="#" class="cta">💳 Pogledaj pakete</a>
</section>

<div class="panel">
  <h2>🔴 LIVE aktivnost</h2>
  <div class="counter" id="liveUsers">0</div>
</div>

</div>

<a href="https://wa.me/38761757797" class="whatsapp">WhatsApp</a>

<script>

// FIX NAJBITNIJI
const nav = document.getElementById("nav");

function openNav(){nav.classList.add("open")}
function closeNav(){nav.classList.remove("open")}

// LIVE
function random(min,max){
  return Math.floor(Math.random()(max-min+1))+min;
}
function update(){
  document.getElementById("liveUsers").textContent = random(1800,3200);
}
setInterval(update,3000);
update();

</script>

</body>
</html>
