<!doctype html>
<html lang="bs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LucStream TV – Premium TV servis</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#2ac0ff;
  --accent:#4a6bff;
  --bg:#020617;
  --glass:rgba(255,255,255,.05);
}

{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#07112b,#020617);
  color:#e6f7ff;
}

/ CONTAINER /
.wrap{max-width:1100px;margin:auto;padding:0 18px}

/ HEADER /
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}
.site-logo{max-width:150px}

.menu-toggle{
  background:none;border:none;
  color:var(--neon);
  font-size:26px;
}

/ NAV /
.overlay{
  position:fixed;inset:0;
  background:rgba(0,10,30,.96);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.overlay.open{
  opacity:1;
  pointer-events:auto;
}
.overlay a{
  font-size:24px;
  margin:12px;
}
.closebtn{
  position:absolute;top:20px;right:20px;
  font-size:32px;
}

/ HERO /
.hero{text-align:center;padding:50px 10px}

.hero h1{
  font-family:'Bebas Neue';
  font-size:60px;
  background:linear-gradient(90deg,#fff,#2ac0ff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  color:#9fb3d1;
  margin:15px auto;
  max-width:600px;
}

/ BUTTONS /
.cta{
  display:inline-block;
  margin:10px;
  padding:14px 28px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--neon),var(--accent));
  font-weight:700;
  transition:.25s;
}
.cta:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(42,192,255,.4);
}

/ PANELS /
.panel{
  background:var(--glass);
  border-radius:18px;
  padding:25px;
  margin:25px 0;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.05);
}

/ LIVE /
.counter{
  font-size:30px;
  font-weight:800;
  color:var(--neon);
}

/ TESTIMONIAL /
#testimonial{
  font-style:italic;
  color:#9fb3d1;
}

/ WHATSAPP /
.whatsapp{
  position:fixed;
  right:18px;
  bottom:18px;
  padding:14px;
  border-radius:14px;
  background:#25d366;
  font-weight:700;
}
</style>
</head>

<body>

<div class="wrap">

<header>
  <img src="lucstream.logo.jpg" class="site-logo">
  <button class="menu-toggle" onclick="openNav()">☰</button>
</header>

<nav id="nav" class="overlay">
  <div class="closebtn" onclick="closeNav()">×</div>
  <a href="#">Početna</a>
  <a href="#">Cjenovnik</a>
  <a href="#">Kontakt</a>
</nav>

<section class="hero">
  <h1>LUCSTREAM TV</h1>
  <p>Premium TV iskustvo • 20.000+ korisnika • Stabilan 4K streaming</p>

  <a href="#" class="cta">🎯 Besplatna proba</a>
  <a href="#" class="cta">💳 Pogledaj pakete</a>
</section>

<div class="panel" style="text-align:center">
  <h2>🔴 LIVE aktivnost</h2>
  <div class="counter" id="liveUsers">0</div>
</div>

<div class="panel" style="text-align:center">
  <h2>💬 Iskustva</h2>
  <p id="testimonial"></p>
</div>

</div>

<a href="https://wa.me/38761757797" class="whatsapp">WhatsApp</a>

<script>
const nav = document.getElementById("nav");

function openNav(){nav.classList.add("open")}
function closeNav(){nav.classList.remove("open")}

// LIVE
function r(min,max){return Math.floor(Math.random()(max-min+1))+min;}
function live(){document.getElementById("liveUsers").textContent=r(1800,3200);}
setInterval(live,3000); live();

// TESTIMONIALS
let t=[
"Radi savršeno bez štekanja.",
"Najbolji IPTV koji sam imao.",
"Vrijedi svake marke.",
"Podrška top!"
];
let i=0;
function rot(){
 document.getElementById("testimonial").textContent='"'+t[i]+'"';
 i=(i+1)%t.length;
}
setInterval(rot,3000); rot();
</script>

</body>
</html>
