<!doctype html>
<html lang="bs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>LucStream TV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Inter;
  background:linear-gradient(180deg,#020617,#020b1f);
  color:#e6f7ff;
}

a{color:inherit;text-decoration:none}

.wrap{max-width:1100px;margin:auto;padding:0 16px}

/ HEADER /
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 0;
}
.site-logo{max-width:150px}

.menu-toggle{
  font-size:26px;
  background:none;
  border:none;
  color:#2ac0ff;
}

/ NAV /
.overlay{
  position:fixed;
  inset:0;
  background:#020b1f;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}
.overlay.open{
  opacity:1;
  pointer-events:auto;
}
.overlay a{
  font-size:24px;
  margin:10px;
}
.closebtn{
  position:absolute;
  top:20px;
  right:20px;
  font-size:32px;
}

/ HERO /
.hero{
  text-align:center;
  padding:40px 0;
}

.hero h1{
  font-family:'Bebas Neue';
  font-size:52px;
  background:linear-gradient(90deg,#fff,#2ac0ff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin:12px 0 20px;
  color:#9fb3d1;
}

.cta{
  display:inline-block;
  margin:8px;
  padding:14px 22px;
  border-radius:12px;
  background:linear-gradient(135deg,#2ac0ff,#4a6bff);
  font-weight:700;
}

/ PANEL /
.panel{
  background:rgba(255,255,255,.05);
  padding:20px;
  border-radius:16px;
  margin:20px 0;
  text-align:center;
}

.counter{
  font-size:28px;
  font-weight:800;
  color:#2ac0ff;
}

/ WHATSAPP /
.whatsapp{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#25d366;
  padding:12px 16px;
  border-radius:12px;
  color:#fff;
}
</style>
</head>

<body>

<div class="wrap">

<header>
  <img src="lucstream.logo.jpg" class="site-logo">
  <button class="menu-toggle" onclick="openNav()">☰</button>
</header>

<nav id="nav" class="overlay">
  <div class="closebtn" onclick="closeNav()">×</div>
  <a href="#">Početna</a>
  <a href="#">Cjenovnik</a>
  <a href="#">Kontakt</a>
</nav>

<section class="hero">
  <h1>LUCSTREAM TV</h1>
  <p>Premium TV iskustvo • Stabilan 4K streaming</p>

  <a href="#" class="cta">🎯 Besplatna proba</a>
  <a href="#" class="cta">💳 Pogledaj pakete</a>
</section>

<div class="panel">
  <h2>🔴 LIVE aktivnost</h2>
  <div class="counter" id="live">0</div>
</div>

</div>

<a href="https://wa.me/38761757797" class="whatsapp">WhatsApp</a>

<script>
const nav = document.getElementById("nav");

function openNav(){nav.classList.add("open")}
function closeNav(){nav.classList.remove("open")}

function rand(min,max){
 return Math.floor(Math.random()(max-min+1))+min;
}

function update(){
 document.getElementById("live").textContent = rand(1800,3200);
}
setInterval(update,3000);
update();
</script>

</body>
</html>
